services:
  - type: web
    name: inventory-backend-ujim
    env: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: https://frontend-kappa-three-83.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0
