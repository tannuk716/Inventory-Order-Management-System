services:
  - type: web
    name: inventory-backend
    runtime: python
    region: oregon
    plan: free
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://frontend-kappa-three-83.vercel.app
    healthCheckPath: /

databases:
  - name: inventory-db
    databaseName: inventory_db
    user: inventory_user
    plan: free
    region: oregon
